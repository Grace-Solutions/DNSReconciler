# -------------------------------------------------------
# DNS Reconciler — Production Compose
#
# Pulls the pre-built image from Docker Hub.
# For local builds from source, use iac/docker/docker-compose-build.yml.
#
# Usage:
#   docker compose up -d
#
# First Run:
#   If no config.json exists in the dnsreconciler_config volume,
#   the application auto-generates a safe default with all
#   providers and records disabled. Edit it with real values
#   and restart the container.
#
# Volumes:
#   dnsreconciler_config — persistent config (config.json)
#   dnsreconciler_state  — persistent reconciliation state
#   Docker socket is mounted read-only for container
#   discovery (IPVLAN/MACVLAN). Remove if not needed.
#
# Environment:
#   Copy iac/docker/.env.example to .env in this directory
#   and fill in your credentials. All variables are loaded
#   via env_file. Every CLI flag has an env var equivalent:
#
#   CONFIG_PATH          — path to config.json (default: /config/config.json)
#   STATE_PATH           — override state file path
#   NODE_ID              — explicit node identity
#   ONCE                 — "true" or "1" for single-pass mode
#   RECONCILE_SCHEDULE   — 6-field cron override
#   CONFIG_URL           — remote config URL
#   CONFIG_HEADER        — HTTP header name for remote auth
#   CONFIG_TOKEN         — HTTP header value / bearer token
#   CONFIG_METHOD        — HTTP method: GET (default) or POST
#   CONFIG_TTL           — re-fetch interval (e.g. 30m, 1h)
#
# Command (optional):
#   The default command is:
#     dnsreconciler -config /config/config.json
#   Uncomment and edit the command: below to pass explicit
#   CLI flags instead of (or in addition to) env vars.
#
# Secrets (optional):
#   To use file-based secrets instead of env vars,
#   uncomment the secrets sections below and reference
#   them in config.json as "file:/run/secrets/<name>".
# -------------------------------------------------------

#secrets:
#  cf_api_token:
#    file: ./secrets/cf_api_token
#  cf_zone_id:
#    file: ./secrets/cf_zone_id
#  tech_api_token:
#    file: ./secrets/tech_api_token
#  pdns_api_key:
#    file: ./secrets/pdns_api_key

networks:
  EXTERNAL:
    name: DNSRECONCILER-EXTERNAL
    driver: bridge
    internal: false
    attachable: true

volumes:
  DNSRECONCILER-CONFIG-00001:
    driver: local
  DNSRECONCILER-STATE-00001:
    driver: local

services:
  dnsreconciler:
    image: gsoperator/dnsreconciler:latest
    container_name: DNSRECONCILER-APP-00001
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 30s
    logging:
      driver: 'local'
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      start_period: 60s
      interval: 30s
      retries: 3
      timeout: 10s
    networks:
      EXTERNAL:
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.5'
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - DNSRECONCILER-CONFIG-00001:/config
      - DNSRECONCILER-STATE-00001:/state
    environment:
      DNS_PUBLIC_HOSTNAME: '${DNS_PUBLIC_HOSTNAME:-dnsreconciler.mydomain.local}'
    labels:
      dns.public.hostname: ${DNS_PUBLIC_HOSTNAME}
