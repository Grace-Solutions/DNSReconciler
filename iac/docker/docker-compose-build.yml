# -------------------------------------------------------
# DNS Reconciler — Local Build Compose
#
# Builds the image from source using the Dockerfile.
# Use this for development or when you want to build
# your own image rather than pulling from Docker Hub.
#
# Usage:
#   docker compose -f docker-compose-build.yml up -d --build
#
# Environment:
#   Copy .env.example to .env and fill in your credentials.
#   All variables are loaded via env_file — no need to
#   duplicate them in an environment: block.
#
# Volumes:
#   ./config  — place your config.json here
#   ./state   — persisted reconciliation state
#   Docker socket is mounted read-only for container
#   discovery (IPVLAN/MACVLAN). Remove if not needed.
#
# Secrets (optional):
#   To use file-based secrets instead of env vars,
#   uncomment the secrets sections below and reference
#   them in config.json as "file:/run/secrets/<name>".
# -------------------------------------------------------

services:
  dnsreconciler:
    build:
      context: ../../
      dockerfile: iac/docker/Dockerfile
    image: gsoperator/dnsreconciler:latest
    container_name: dnsreconciler
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/config
      - ./state:/state
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 64M

