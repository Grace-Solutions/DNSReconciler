services:
  dnsreconciler:
    build:
      context: ../../
      dockerfile: iac/docker/Dockerfile
    image: gracesolutions/dnsreconciler:latest
    container_name: dnsreconciler
    restart: unless-stopped
    # Copy .env.example to .env and fill in your real credentials
    env_file:
      - .env
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - RECONCILE_INTERVAL_SECONDS=${RECONCILE_INTERVAL_SECONDS:-}
    volumes:
      - ./config:/config
      - ./state:/state
    secrets:
      - cf_api_token
      - cf_zone_id
      - tech_api_token
      - pdns_api_key
    deploy:
      resources:
        limits:
          memory: 64M

# Docker secrets — create these files alongside docker-compose.yml
# and populate them with your real credentials. They are mounted
# read-only at /run/secrets/<name> inside the container.
# Reference them in config.json as: "file:/run/secrets/cf_api_token"
secrets:
  cf_api_token:
    file: ./secrets/cf_api_token
  cf_zone_id:
    file: ./secrets/cf_zone_id
  tech_api_token:
    file: ./secrets/tech_api_token
  pdns_api_key:
    file: ./secrets/pdns_api_key
